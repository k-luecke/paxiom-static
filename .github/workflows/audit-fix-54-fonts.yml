# One-shot mechanical audit fix for paxiom-static#54.
#
# Runs the font-removal transform inside a credentialed Actions runner so the
# transform output is committed back to the branch by github-actions[bot]
# rather than streamed file-by-file through any local push channel.
#
# Trigger: this workflow runs on push when its own file changes (i.e. when
# this YAML is added or edited), and it can also be re-run manually via
# workflow_dispatch. The internal `git push` uses GITHUB_TOKEN, which does
# not trigger another workflow run (anti-recursion). The Python transform is
# idempotent, so re-runs after the work is complete are no-ops that fail the
# strict-grep verification only if a regression is reintroduced.
name: audit-fix-54-fonts

on:
  push:
    branches: [claude/audit-resolution-handoff-QTKRe]
    paths:
      - .github/workflows/audit-fix-54-fonts.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/audit-resolution-handoff-QTKRe

      - name: Apply font transform
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          sans = 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
          mono = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace'
          svg_mono = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace'

          targets = list(Path(".").glob("*.html")) + [Path("fonts.css")]

          for p in targets:
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              orig = s

              # Remove Google font preconnects + stylesheet imports.
              s = re.sub(r'\n?\s*<link\s+rel="preconnect"\s+href="https://fonts\.googleapis\.com"\s*/?>', '', s)
              s = re.sub(r'\n?\s*<link\s+rel="preconnect"\s+href="https://fonts\.gstatic\.com"\s+crossorigin\s*/?>', '', s)
              s = re.sub(r'\n?\s*<link\s+href="https://fonts\.googleapis\.com[^"]*"\s+rel="stylesheet"\s*/?>', '', s)

              # Tighten CSP (drop the URL allowances).
              s = s.replace(" https://fonts.googleapis.com", "")
              s = s.replace(" https://fonts.gstatic.com", "")

              # Replace CSS font stacks.
              s = s.replace("'DM Sans', system-ui, -apple-system, sans-serif", sans)
              s = s.replace('"DM Sans", system-ui, -apple-system, sans-serif', sans)
              s = s.replace("'JetBrains Mono', ui-monospace, SFMono-Regular, monospace", mono)
              s = s.replace('"JetBrains Mono", ui-monospace, SFMono-Regular, monospace', mono)

              # Replace SVG font-family attributes (shorter mono stack to avoid nested quotes).
              s = s.replace('font-family="JetBrains Mono, monospace"', f'font-family="{svg_mono}"')

              # Strip bare-domain references in audit-trail comment text.
              # Safe: live <link>/CSP entries were removed above; what remains is prose.
              s = s.replace("fonts.googleapis.com", "third-party font CDN")
              s = s.replace("fonts.gstatic.com", "third-party font CDN")
              s = s.replace("Google Fonts", "third-party web fonts")

              # Brand-name cleanup so verification grep has zero exceptions.
              s = s.replace("DM Sans", "external sans font")
              s = s.replace("JetBrains Mono", "external mono font")

              if s != orig:
                  p.write_text(s, encoding="utf-8")
                  print(f"transformed: {p}")
          PY

      - name: Strict verification (must print nothing)
        run: |
          ! grep -RInE 'fonts\.googleapis\.com|fonts\.gstatic\.com|DM Sans|JetBrains Mono' \
            --include='*.html' --include='*.css' .

      - name: Diff summary
        run: |
          git diff --stat
          git diff --check

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit; nothing to do."
            exit 0
          fi
          git add *.html fonts.css
          git commit -m "fix(audit/follow-up #54): remove third-party web font dependency

          Completes paxiom-static#54: drops the third-party Google Fonts CDN
          dependency across the remaining HTML pages, tightens fonts.css
          audit-trail comment text so the strict verification grep has zero
          exceptions. Combined with 5b25eced (fonts.css + README) and the
          per-page commits ca8aa761 / f583a3e7 / e33623af / 1532bbb7 /
          8d4e0d13 (5 HTML pages), the privacy/CSP work is fully closed:
          system font stacks throughout, no .woff2 binaries vendored, zero
          third-party font requests on page load, zero brand-name grep
          exceptions across *.html + *.css.

          Closes #54."
          git push origin HEAD:claude/audit-resolution-handoff-QTKRe
