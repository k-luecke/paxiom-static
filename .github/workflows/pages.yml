name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Forbid inline JS / dynamic content (audit I-3)
        run: |
          # Active-content guard: matches opening <script> tags AND inline
          # event handlers (onclick=, onload=, onerror=, ...). External
          # <script src=...> would also match — by design. Ungate this
          # gate when intentional JS lands.
          if grep -rEn --include='*.html' \
              '<script(\s[^>]*)?>|\son[a-z]+\s*=' .; then
            echo "::error::Active-content pattern detected — see audit/I-3."
            exit 1
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Stage publish directory (audit L-12)
        run: |
          # Build dist/ containing only the public assets. Excludes repo
          # meta (.git*, .github/) and audit/contributor docs that have
          # no business being served (AUDIT_REPORT.md, README.md).
          # upload-pages-artifact@v3 takes a single path, so we stage
          # instead of globbing.
          mkdir -p dist
          rsync -a \
            --exclude='dist' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='AUDIT_REPORT.md' \
            --exclude='README.md' \
            ./ dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
