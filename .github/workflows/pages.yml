name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Forbid inline JS / dynamic content (audit I-3)
        run: |
          # Active-content guard: matches opening <script> tags AND inline
          # event handlers (onclick=, onload=, onerror=, ...). External
          # <script src=...> would also match — by design. Ungate this
          # gate when intentional JS lands.
          if grep -rEn --include='*.html' \
              '<script(\s[^>]*)?>|\son[a-z]+\s*=' .; then
            echo "::error::Active-content pattern detected — see audit/I-3."
            exit 1
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
