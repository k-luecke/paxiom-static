<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; base-uri 'none'; form-action 'none'">
<meta name="description" content="Page not found on paxiom.org. The Paxiom static site moved or this path does not exist. Return to the homepage.">
<title>Paxiom — Page Not Found</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f8f6;
    color: #101312;
  }
  main {
    width: min(620px, calc(100vw - 40px));
  }
  h1 {
    font-size: clamp(36px, 7vw, 72px);
    line-height: 1;
    margin: 0 0 18px;
    letter-spacing: 0;
  }
  p {
    color: #64706a;
    font-size: 18px;
    line-height: 1.55;
  }
  a {
    color: #234f7d;
    font-weight: 700;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <h1>404</h1>
  <p>The Paxiom static site moved or this path does not exist.</p>
  <p><a href="/">Return to paxiom.org</a></p>
</main>
</body>
</html>
